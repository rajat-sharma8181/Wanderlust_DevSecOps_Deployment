apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wanderlust.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        {{- include "wanderlust.labels" . | nindent 8 }}
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "wanderlust.image" (dict "reg" .Values.global.imageRegistry "img" .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            # Vite dev server reads VITE_-prefixed env vars, overriding the baked .env.local.
            - name: VITE_API_PATH
              value: {{ .Values.frontend.env.VITE_API_PATH | quote }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wanderlust.labels" . | nindent 4 }}
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
