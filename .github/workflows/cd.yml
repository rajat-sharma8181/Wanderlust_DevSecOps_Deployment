name: Wanderlust CD Pipeline

on:
  workflow_dispatch:
    inputs:
      FRONTEND_DOCKER_TAG:
        description: 'Docker image tag for the frontend image'
        required: true
        type: string
      BACKEND_DOCKER_TAG:
        description: 'Docker image tag for the backend image'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to EKS via Helm
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-poc-demo-dev --region ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.32.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Show inputs
        run: |
          echo "Frontend tag: ${{ github.event.inputs.FRONTEND_DOCKER_TAG }}"
          echo "Backend tag:  ${{ github.event.inputs.BACKEND_DOCKER_TAG }}"

      - name: Helm Upgrade
        run: |
          helm upgrade --install wanderlust helm/wanderlust \
            --namespace wanderlust \
            --create-namespace \
            --set frontend.image.tag=${{ github.event.inputs.FRONTEND_DOCKER_TAG }} \
            --set backend.image.tag=${{ github.event.inputs.BACKEND_DOCKER_TAG }} \
            --wait --timeout 10m

      - name: Verify Rollout - Backend
        run: kubectl -n wanderlust rollout status deploy/backend-deployment --timeout=5m

      - name: Verify Rollout - Frontend
        run: kubectl -n wanderlust rollout status deploy/frontend-deployment --timeout=5m

      - name: Get Ingress Address
        run: kubectl -n wanderlust get ingress wanderlust-ingress