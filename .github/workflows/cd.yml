name: Wanderlust CD Pipeline (GitOps)

# Downstream of CI. CI's `trigger-cd` job dispatches `repository_dispatch: trigger-cd`
# with the image tags after a successful build => a green CI run auto-runs this.
# This workflow NEVER talks to Kubernetes: it bumps the image tags in the Helm
# values file and commits. ArgoCD (auto-sync + self-heal) reconciles the cluster.

on:
  repository_dispatch:
    types:
      - trigger-cd

  workflow_dispatch:
    inputs:
      FRONTEND_DOCKER_TAG:
        description: Frontend Docker image tag
        required: true
        type: string
      BACKEND_DOCKER_TAG:
        description: Backend Docker image tag
        required: true
        type: string

concurrency:
  group: wanderlust-gitops-cd
  cancel-in-progress: false

jobs:
  update-manifests:
    name: Update Helm Values (GitOps)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      VALUES_FILE: helm/wanderlust/values.yaml
      FRONTEND_DOCKER_TAG: ${{ github.event.client_payload.FRONTEND_DOCKER_TAG || github.event.inputs.FRONTEND_DOCKER_TAG }}
      BACKEND_DOCKER_TAG: ${{ github.event.client_payload.BACKEND_DOCKER_TAG || github.event.inputs.BACKEND_DOCKER_TAG }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify Inputs
        run: |
          echo "Frontend Tag : ${FRONTEND_DOCKER_TAG}"
          echo "Backend Tag  : ${BACKEND_DOCKER_TAG}"
          test -n "${FRONTEND_DOCKER_TAG}" || { echo "Frontend tag missing"; exit 1; }
          test -n "${BACKEND_DOCKER_TAG}" || { echo "Backend tag missing"; exit 1; }
          test -f "${VALUES_FILE}" || { echo "Values file not found: ${VALUES_FILE}"; exit 1; }

      - name: Update Image Tags
        # yq (mikefarah, Go) is preinstalled on ubuntu-latest.
        run: |
          yq -i '.backend.image.tag = strenv(BACKEND_DOCKER_TAG)' "${VALUES_FILE}"
          yq -i '.frontend.image.tag = strenv(FRONTEND_DOCKER_TAG)' "${VALUES_FILE}"
          echo "Updated image tags:"
          yq '.backend.image'  "${VALUES_FILE}"
          yq '.frontend.image' "${VALUES_FILE}"

      - name: Validate Helm Chart
        run: helm lint helm/wanderlust

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_FILE}"
          if git diff --cached --quiet; then
            echo "No tag change; nothing to deploy."
          else
            git commit -m "chore(gitops): deploy backend=${BACKEND_DOCKER_TAG} frontend=${FRONTEND_DOCKER_TAG}"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Done
        run: |
          echo "========================================"
          echo "Tags committed to Git."
          echo "Backend Image : ${BACKEND_DOCKER_TAG}"
          echo "Frontend Image: ${FRONTEND_DOCKER_TAG}"
          echo "ArgoCD auto-sync will reconcile the cluster (~3 min)."
          echo "========================================"
