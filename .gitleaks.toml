title = "Wanderlust gitleaks config"

# Keep all built-in gitleaks rules.
[extend]
useDefault = true

[allowlist]
description = "SonarQube curl calls pass the SONAR_TOKEN GitHub Actions secret via an env var (curl -u \"${SONAR_TOKEN}:\"), not a hardcoded credential. These are false positives for the curl-auth-user rule."

# Match against the finding's matched text (regexTarget = "match") rather than a
# single line, so multi-line `curl -v \` / `-u "${SONAR_TOKEN}:"` continuations
# are covered. This is commit-agnostic: it stays green no matter which commit the
# line appears in, and whether the line is active or commented out.
regexTarget = "match"
regexes = [
  '''SONAR_TOKEN''',
]
