server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: React Router client-side routes (e.g. /blog/123) must return
    # index.html instead of 404 so the app can render the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
